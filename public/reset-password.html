<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Restablecer Contraseña - Horix Logistics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f14;--surface:#161a23;--surface2:#1e2330;--border:#2a3045;--accent:#00A86B;--accent2:#f7944f;--success:#4fbe96;--danger:#f7614f;--text:#e8ecf5;--muted:#7a85a0;--font-head:'Plus Jakarta Sans',sans-serif;--font-body:'DM Sans',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;line-height:1.5;display:flex;align-items:center;justify-content:center;min-height:100vh}
a{color:var(--accent);text-decoration:none}
input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 14px;font:inherit;width:100%;outline:none;transition:border .15s}
input:focus{border-color:var(--accent)}
button,.btn{cursor:pointer;border:none;border-radius:9px;font:600 14px/1 var(--font-body);padding:11px 22px;transition:all .15s;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{filter:brightness(1.15)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:420px;margin:20px}
.card h1{font-family:var(--font-head);font-size:22px;margin-bottom:4px}
.card p{color:var(--muted);font-size:14px;margin-bottom:20px}
.card .logo{font-size:40px;margin-bottom:12px}
.form-group{margin-bottom:16px}
.form-group label{font-size:13px;color:var(--muted);display:block;margin-bottom:4px}
.error{color:var(--danger);font-size:13px;display:none;margin-bottom:12px}
.success{display:none;padding:16px;background:rgba(79,190,150,.1);border-radius:8px;color:var(--success);font-size:14px;text-align:center;margin-bottom:16px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">🚚</div>
  <h1>Restablecer Contraseña</h1>
  <p>Ingresa tu nueva contraseña</p>
  <div class="error" id="reset-error"></div>
  <div class="success" id="reset-success"></div>
  <div id="reset-form">
    <div class="form-group">
      <label>Nueva contraseña</label>
      <input type="password" id="reset-pass" placeholder="Mínimo 8 caracteres" autocomplete="new-password" onkeydown="if(event.key==='Enter')doReset()">
    </div>
    <div class="form-group">
      <label>Confirmar contraseña</label>
      <input type="password" id="reset-pass2" placeholder="Repite la contraseña" autocomplete="new-password" onkeydown="if(event.key==='Enter')doReset()">
    </div>
    <button class="btn btn-primary" id="btn-reset" onclick="doReset()" style="width:100%;justify-content:center;">Restablecer contraseña</button>
  </div>
  <div style="text-align:center;margin-top:20px;font-size:13px;color:var(--muted);">
    <a href="/">Volver al inicio de sesión</a>
  </div>
</div>

<script>
const token = new URLSearchParams(location.search).get('token');
if (!token) {
  document.getElementById('reset-form').style.display = 'none';
  document.getElementById('reset-error').textContent = 'Enlace inválido. Solicita un nuevo restablecimiento de contraseña.';
  document.getElementById('reset-error').style.display = 'block';
}

async function doReset() {
  const pass = document.getElementById('reset-pass').value;
  const pass2 = document.getElementById('reset-pass2').value;
  const errEl = document.getElementById('reset-error');
  const btn = document.getElementById('btn-reset');
  if (!pass || pass.length < 8) { errEl.textContent = 'La contraseña debe tener al menos 8 caracteres'; errEl.style.display = 'block'; return; }
  if (pass !== pass2) { errEl.textContent = 'Las contraseñas no coinciden'; errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Restableciendo...';
  try {
    const res = await fetch('/api/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password: pass })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    document.getElementById('reset-form').style.display = 'none';
    const successEl = document.getElementById('reset-success');
    successEl.style.display = 'block';
    successEl.innerHTML = '✅ Contraseña actualizada correctamente.<br><br><a href="/" style="color:var(--accent);font-weight:600;">Ir al inicio de sesión →</a>';
  } catch (e) {
    errEl.textContent = e.message; errEl.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = 'Restablecer contraseña';
  }
}
</script>
</body>
</html>
